    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap');

        :root {
            --primary: #2d5a27;
            --secondary: #f4f1ea;
            --accent: #d4a373;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--secondary);
            color: #333;
            overflow: hidden; /* Prevent body scroll to keep it app-like */
        }

        .slide-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            padding-top: 5rem;
            padding-bottom: 6rem;
        }

        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 1200px; /* Lebar maksimal ditingkatkan */
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 12px solid var(--primary);
            transition: all 0.3s ease;
        }

        .card-content {
            padding: 3rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        .heading-font {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem; /* Judul lebih besar */
            line-height: 1.2;
        }

        @media (max-width: 768px) {
            .heading-font { font-size: 2.2rem; }
            .card-content { padding: 1.5rem; }
        }

        .text-xl-custom { font-size: 1.5rem; line-height: 1.6; }
        .text-lg-custom { font-size: 1.25rem; line-height: 1.6; }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, background 0.2s;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            background: #1e3d1a;
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .tamansiswa-badge {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeeba;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Sidebar styling */
        .sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom scrollbar */
        .card-content::-webkit-scrollbar { width: 8px; }
        .card-content::-webkit-scrollbar-track { background: #f1f1f1; }
        .card-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .card-content::-webkit-scrollbar-thumb:hover { background: #aaa; }

        let currentSlide = 0;

        function renderSlide() {
            const slide = slides[currentSlide];
            const viewport = document.getElementById('slideViewport');
            
            // Generate Slide HTML
            viewport.innerHTML = `
                <div class="card fade-in">
                    <div class="card-content">
                        <div class="mb-4">
                            <span class="text-sm font-black text-green-700 tracking-[0.3em] uppercase opacity-70">${slide.category}</span>
                        </div>
                        <h2 class="heading-font text-gray-900 mb-4">${slide.title}</h2>
                        ${slide.subtitle ? `<p class="text-2xl text-gray-500 mb-10 font-light border-b pb-6">${slide.subtitle}</p>` : ''}
                        <div class="mt-4">
                            ${slide.content}
                        </div>
                    </div>
                </div>
            `;

            // Update UI State
            document.getElementById('slideIndicator').innerText = `Slide ${currentSlide + 1} dari ${slides.length}`;
            document.getElementById('categoryBadge').innerText = slide.category;
            
            const progress = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;

            // Update Navigation Buttons
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;

            // Scroll card content to top
            const activeCardContent = document.querySelector('.card-content');
            if(activeCardContent) activeCardContent.scrollTop = 0;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        function goToSlide(index) {
            currentSlide = index;
            renderSlide();
            toggleSidebar(false);
        }

        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebar');
            if (force === false) {
                sidebar.classList.add('translate-x-full');
            } else {
                sidebar.classList.toggle('translate-x-full');
            }
        }

        // Initialize Sidebar Menu
        function initMenu() {
            const menuP1 = document.getElementById('menuP1');
            const menuP2 = document.getElementById('menuP2');
            
            slides.forEach((slide, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <button onclick="goToSlide(${index})" class="w-full text-left p-3 hover:bg-gray-100 rounded-xl text-lg flex items-center gap-4 transition-colors">
                        <span class="text-xs w-6 h-6 bg-gray-200 flex items-center justify-center rounded-full text-gray-700 font-bold">${index + 1}</span>
                        <span class="${index === currentSlide ? 'font-black text-green-800' : 'text-gray-600'}">${slide.title}</span>
                    </button>
                `;
                
                if (index < 9) {
                    menuP1.appendChild(li);
                } else {
                    menuP2.appendChild(li);
                }
            });
        }

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Initialize App
        window.onload = () => {
            renderSlide();
            initMenu();
        };
    </script>
